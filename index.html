
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Gestures, Lasting Love</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --linen:#E4E0D8;
    --linen-deep:#D6D1C5;
    --spine-line:#B9B4A6;
    --page:#FFFFFF;
    --ink:#2E2B25;
    --ink-soft:#6B6658;
    --rose:#A8766B;
    --gold:#B6986B;
    --shadow: rgba(40,35,25,0.28);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; min-height:100vh;
    background: linear-gradient(180deg, #ECE9E2 0%, #DCD7CB 100%);
    font-family: 'Cormorant Garamond', serif;
    display:flex; align-items:center; justify-content:center;
    overflow-x:hidden;
  }
  .stage{
    width:100%; max-width:600px; padding:32px 24px;
    display:flex; flex-direction:column; align-items:center;
    box-sizing:border-box;
  }
  .book-wrap{
    position:relative;
    width: min(420px, calc(100vw - 64px));
    height: min(560px, calc((100vw - 64px) * 4 / 3), 78vh);
    flex-shrink:0;
  }

  /* ===== COVER — flat linen album, matches reference exactly ===== */
  .cover{
    position:absolute; inset:0; border-radius:2px;
    background:
      repeating-linear-gradient(91deg, rgba(0,0,0,0.018) 0px, transparent 1px, transparent 2px),
      repeating-linear-gradient(1deg, rgba(255,255,255,0.05) 0px, transparent 1px, transparent 2px),
      var(--linen);
    display:flex; flex-direction:column; align-items:center; justify-content:space-between;
    z-index:20;
    transform-origin: left center;
    transition: transform 1.1s cubic-bezier(.65,.05,.36,1), box-shadow 1.1s ease;
    box-shadow: 0 24px 60px var(--shadow);
    cursor:pointer;
    padding: 56px 40px;
    backface-visibility: hidden;
  }
  .cover.opened{
    transform: rotateY(-179.9deg);
    box-shadow: 0 24px 60px transparent;
    pointer-events:none;
  }
  .cover-spine-line{
    position:absolute; left:38px; top:0; bottom:0; width:1px;
    background: var(--spine-line);
  }
  .cover-title{
    font-size:15px; color:var(--ink-soft); letter-spacing:2.8px; text-transform:uppercase;
    text-align:center; line-height:1.7; margin-top:8px;
  }
  .cover-year{
    font-size:13px; color:var(--ink-soft); letter-spacing:1.5px; opacity:0.75;
    margin-bottom:4px;
  }

  /* ===== PAGES ===== */
  .pages-base{
    position:absolute; inset:0; border-radius:2px;
    background: var(--page);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.05);
  }
  .page-content{
    position:absolute; inset:0; border-radius:2px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:50px 40px; text-align:center;
    background: var(--page);
  }
  .page-week{
    font-size:13px; color:var(--ink-soft); letter-spacing:3px; text-transform:uppercase;
    margin-bottom:26px; opacity:0.7;
  }
  .page-idea{
    font-size:17px; line-height:2; color:var(--ink-soft); font-weight:500;
    letter-spacing:2.2px; text-transform:uppercase;
    max-width:380px;
  }
  .page-divider{
    width:30px; height:1px; background:var(--rose); opacity:0.5; margin:26px auto;
  }
  .page-footer{
    position:absolute; bottom:36px; left:0; right:0;
    display:flex; flex-direction:column; align-items:center; gap:12px;
  }
  .skip-link{
    font-size:14px; font-style:italic; color:var(--ink-soft);
    background:none; border:none; cursor:pointer;
    border-bottom:1px solid rgba(107,102,88,0.3);
    letter-spacing:0.3px; padding:4px 2px; transition: color 0.2s, border-color 0.2s;
  }
  .skip-link:hover{ color:var(--rose); border-bottom-color:var(--rose); }
  .choose-link{
    font-size:13px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase;
    color:#fff; background:linear-gradient(135deg, var(--gold) 0%, #97794F 100%);
    border:none; cursor:pointer; border-radius:2px;
    padding:11px 28px; transition: opacity 0.2s, transform 0.15s;
    box-shadow:0 3px 10px rgba(151,121,79,0.35);
  }
  .choose-link:hover{ opacity:0.92; transform:translateY(-1px); }
  .choose-link:disabled{ opacity:0.65; cursor:default; transform:none; }
  .page-number{
    font-size:12px; color:var(--ink-soft); letter-spacing:1.5px; opacity:0.55;
  }

  /* ===== CURVED PAGE TURN — sliced into strips that bow outward mid-turn ===== */
  /* The turning page is divided into vertical strips. Each strip rotates
     around the spine by a slightly different amount (driven by JS using a
     sine-based curve), so the page bows outward like real paper instead of
     swinging as one flat rigid plane. */
  .leaf{
    position:absolute; inset:0; border-radius:2px;
    z-index:16; pointer-events:none;
    perspective: 1800px;
    opacity:0;
    filter: blur(0px);
  }
  .leaf.turning{
    opacity:1;
    pointer-events:auto;
    filter: blur(0.4px);
  }
  .leaf-strip{
    position:absolute; top:0; bottom:0;
    transform-style: preserve-3d;
    transform-origin: 0% 50%;
    overflow:hidden;
  }
  .leaf-strip-inner{
    position:absolute; top:0; bottom:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    backface-visibility:hidden;
  }
  .leaf-strip-front{ background: var(--page); }
  .leaf-strip-back{
    background: linear-gradient(100deg, #FAF8F3 0%, #F1ECE0 100%);
    transform: rotateY(180deg);
  }
  .leaf-strip-shade{
    position:absolute; inset:0; pointer-events:none;
    background: rgba(40,35,25,0);
    transition: background 0.05s linear;
  }

  .stage-caption{
    margin-top:24px;
    font-size:14px; font-style:italic; color:#9b9484; letter-spacing:0.4px;
  }

  /* ===== UPLOAD SCREEN — shown after "this is the one" ===== */
  .upload-screen{
    position:absolute; inset:0; border-radius:2px;
    background: var(--page);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:44px 36px; text-align:center;
    z-index:22; opacity:0; pointer-events:none;
    transition: opacity 0.5s ease;
  }
  .upload-screen.visible{ opacity:1; pointer-events:auto; }
  .upload-week{
    font-size:13px; color:var(--ink-soft); letter-spacing:3px; text-transform:uppercase;
    opacity:0.7; margin-bottom:10px;
  }
  .upload-idea{
    font-size:17px; line-height:1.7; color:var(--ink-soft); font-weight:500;
    letter-spacing:1.5px; max-width:340px; margin-bottom:22px;
  }
  .photo-picker{
    width:100%; max-width:280px; height:160px; border-radius:4px;
    border:1.5px dashed rgba(107,102,88,0.35);
    background:rgba(228,224,216,0.25);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; transition:border-color 0.2s, background 0.2s;
    overflow:hidden; position:relative; margin-bottom:18px;
  }
  .photo-picker:hover{ border-color:var(--rose); background:rgba(228,224,216,0.4); }
  .photo-picker img{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  }
  .photo-picker-label{
    font-size:13px; color:var(--ink-soft); letter-spacing:0.5px; font-style:italic;
  }
  .photo-picker input[type=file]{
    position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
  }
  .note-field{
    width:100%; max-width:280px; min-height:64px; resize:none;
    border:1px solid rgba(107,102,88,0.25); border-radius:4px;
    background:rgba(255,255,255,0.6);
    font-family:'Cormorant Garamond', serif; font-size:15px; color:var(--ink);
    padding:12px 14px; margin-bottom:20px; line-height:1.5;
    transition:border-color 0.2s;
  }
  .note-field:focus{ outline:none; border-color:var(--rose); }
  .note-field::placeholder{ color:#b3a99a; font-style:italic; }
  .submit-week{
    font-size:13px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase;
    color:#fff; background:linear-gradient(135deg, var(--gold) 0%, #97794F 100%);
    border:none; cursor:pointer; border-radius:2px;
    padding:12px 32px; transition: opacity 0.2s, transform 0.15s;
    box-shadow:0 3px 10px rgba(151,121,79,0.35);
  }
  .submit-week:hover{ opacity:0.92; transform:translateY(-1px); }
  .submit-week:disabled{ opacity:0.5; cursor:default; transform:none; }
  .upload-status{
    font-size:13px; font-style:italic; color:#9b9484; margin-top:14px; min-height:18px;
  }
  .upload-status.error{ color:#a8635a; }

  /* ===== COMPLETED WEEK STATE ===== */
  .completed-screen{
    position:absolute; inset:0; border-radius:2px;
    background: var(--page);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:44px 36px; text-align:center;
    z-index:22; opacity:0; pointer-events:none;
    transition: opacity 0.5s ease;
  }
  .completed-screen.visible{ opacity:1; pointer-events:auto; }
  .completed-mark{
    font-size:13px; color:var(--gold); letter-spacing:3px; text-transform:uppercase;
    margin-bottom:18px;
  }
  .completed-message{
    font-size:16px; line-height:1.8; color:var(--ink-soft); letter-spacing:0.5px;
    max-width:300px;
  }

  /* ===== LOADING STATE ===== */
  .book-loading{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    z-index:30; background:var(--page);
  }
  .book-loading.visible{ display:flex; }
  .book-loading-text{
    font-size:14px; font-style:italic; color:#9b9484; letter-spacing:0.5px;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="book-wrap" id="bookWrap">

    <div class="pages-base" id="pagesBase">
      <div class="page-content" id="currentPage">
        <div class="page-week" id="currentWeekLabel">Week One</div>
        <div class="page-idea" id="currentIdeaText">Loading…</div>
        <div class="page-divider"></div>
        <div class="page-footer">
          <button class="choose-link" id="chooseBtn">this is the one</button>
          <button class="skip-link" id="skipBtn">show me another</button>
          <div class="page-number" id="pageNumber"></div>
        </div>
      </div>
    </div>

    <!-- the turning page, built from strips at runtime for a curved turn -->
    <div class="leaf" id="leaf"></div>
    <div id="leafContentTemplate" style="display:none;">
      <div class="page-week" id="leafWeekLabel">Week One</div>
      <div class="page-idea" id="leafIdeaText"></div>
      <div class="page-divider"></div>
    </div>

    <!-- shown after "this is the one" -->
    <div class="upload-screen" id="uploadScreen">
      <div class="upload-week" id="uploadWeekLabel">Week One</div>
      <div class="upload-idea" id="uploadIdeaText"></div>
      <label class="photo-picker" id="photoPicker">
        <span class="photo-picker-label" id="photoPickerLabel">tap to add a photo</span>
        <input type="file" accept="image/*" id="photoInput">
      </label>
      <textarea class="note-field" id="noteField" placeholder="how did it go? (optional)" maxlength="280"></textarea>
      <button class="submit-week" id="submitWeekBtn">save this week</button>
      <div class="upload-status" id="uploadStatus"></div>
    </div>

    <!-- shown briefly after a successful save, before the next week unlocks -->
    <div class="completed-screen" id="completedScreen">
      <div class="completed-mark">saved ✓</div>
      <div class="completed-message">This week is tucked away. Come back next week for another small thing.</div>
    </div>

    <div class="cover" id="cover">
      <div class="cover-spine-line"></div>
      <div class="cover-title">Little Gestures,<br>Lasting Love</div>
      <div class="cover-year">their year</div>
    </div>

    <div class="book-loading" id="bookLoading">
      <div class="book-loading-text">opening the book…</div>
    </div>
  </div>

  <div class="stage-caption" id="stageCaption">a quiet beginning</div>
</div>

<audio id="pageSound" preload="auto">
  <source src="https://actions.google.com/sounds/v1/foley/paper_page_flip.ogg" type="audio/ogg">
</audio>

<script>
// ---------- Supabase connection ----------
const SUPABASE_URL = 'https://eioxaevenecdemlaonpv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_7xzTkqN6RhQmLQV5sPj8HQ_dwyvdWas';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// the access token comes from the link he was sent, e.g. ?key=xxxxx
const urlParams = new URLSearchParams(window.location.search);
const ACCESS_TOKEN = urlParams.get('key') || '';

const TOTAL_WEEKS = 52;
const STRIP_COUNT = 24;

let weeksData = [];       // all 52 rows from the `weeks` table
let ideaPool = [];        // unused ideas from `idea_pool`
let currentWeekRow = null;
let currentIdea = null;
let isAnimating = false;
let selectedPhotoFile = null;

const cover = document.getElementById('cover');
const currentWeekLabel = document.getElementById('currentWeekLabel');
const currentIdeaText = document.getElementById('currentIdeaText');
const leaf = document.getElementById('leaf');
const pageNumber = document.getElementById('pageNumber');
const skipBtn = document.getElementById('skipBtn');
const chooseBtn = document.getElementById('chooseBtn');
const pageSound = document.getElementById('pageSound');
const stageCaption = document.getElementById('stageCaption');
const bookWrap = document.getElementById('bookWrap');
const bookLoading = document.getElementById('bookLoading');
const uploadScreen = document.getElementById('uploadScreen');
const uploadWeekLabel = document.getElementById('uploadWeekLabel');
const uploadIdeaText = document.getElementById('uploadIdeaText');
const photoPicker = document.getElementById('photoPicker');
const photoPickerLabel = document.getElementById('photoPickerLabel');
const photoInput = document.getElementById('photoInput');
const noteField = document.getElementById('noteField');
const submitWeekBtn = document.getElementById('submitWeekBtn');
const uploadStatus = document.getElementById('uploadStatus');
const completedScreen = document.getElementById('completedScreen');

const ORDINALS = ["One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten",
  "Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen","Twenty"];
function ordinalWeek(n){ return ORDINALS[n-1] || n; }

function pickRandom(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

function playPageSound(){
  try{ pageSound.currentTime = 0; pageSound.volume = 0.55; pageSound.play().catch(()=>{}); }catch(e){}
}

// ---------- Loading state from Supabase ----------
async function loadBookState(){
  if(!ACCESS_TOKEN){
    bookLoading.querySelector('.book-loading-text').textContent =
      "this link is missing its key — please use the link exactly as it was sent";
    return false;
  }
  try{
    const [weeksRes, poolRes] = await Promise.all([
      supabaseClient.rpc('get_weeks', { token: ACCESS_TOKEN }),
      supabaseClient.rpc('get_idea_pool', { token: ACCESS_TOKEN })
    ]);
    if(weeksRes.error) throw weeksRes.error;
    if(poolRes.error) throw poolRes.error;

    weeksData = weeksRes.data || [];
    ideaPool = (poolRes.data || []).filter(p => !p.used);
    return true;
  } catch(err){
    console.error('Failed to load book state', err);
    bookLoading.querySelector('.book-loading-text').textContent =
      "couldn't open the book just now — check your connection and reload";
    return false;
  }
}

function findCurrentWeek(){
  // the first week that isn't completed yet is "now"
  return weeksData.find(w => w.status !== 'completed') || null;
}

function showCurrent(weekRow){
  currentWeekRow = weekRow;
  currentWeekLabel.textContent = `Week ${ordinalWeek(weekRow.week_number)}`;
  pageNumber.textContent = `${weekRow.week_number} of ${TOTAL_WEEKS}`;

  if(weekRow.status === 'chosen' && weekRow.idea_text){
    // he already picked an idea for this week in an earlier visit;
    // skip straight to letting him upload, rather than re-offering choices
    currentIdeaText.textContent = weekRow.idea_text;
    currentIdea = { id: null, text: weekRow.idea_text };
    showUploadScreenFor(weekRow);
  } else {
    const next = pickRandom(ideaPool);
    currentIdeaText.textContent = next ? next.idea_text : "—";
    currentIdea = next ? { id: next.id, text: next.idea_text } : null;
    skipBtn.style.display = '';
    chooseBtn.style.display = '';
    chooseBtn.disabled = false;
    chooseBtn.textContent = 'this is the one';
  }
}

/* Build the leaf out of vertical strips. Each strip shows a slice of the
   same content (via a full-width inner element offset left), so visually
   it reads as one continuous page even though it is sliced underneath. */
function buildLeafStrips(weekText, ideaText){
  leaf.innerHTML = '';
  const w = bookWrap.clientWidth;
  const h = bookWrap.clientHeight;
  const stripWidth = w / STRIP_COUNT;
  const overlap = 2.2;

  for(let i = 0; i < STRIP_COUNT; i++){
    const strip = document.createElement('div');
    strip.className = 'leaf-strip';
    strip.style.left = (i * stripWidth - overlap) + 'px';
    strip.style.width = (stripWidth + overlap * 2) + 'px';
    strip.style.height = h + 'px';
    strip.style.transformOrigin = `${-(i * stripWidth - overlap)}px 50%`;

    const front = document.createElement('div');
    front.className = 'leaf-strip-inner leaf-strip-front';
    front.style.left = (-(i * stripWidth - overlap)) + 'px';
    front.style.width = w + 'px';
    front.style.height = h + 'px';
    front.style.padding = '50px 40px';
    front.innerHTML = `
      <div class="page-week">${weekText}</div>
      <div class="page-idea">${ideaText}</div>
      <div class="page-divider"></div>
    `;

    const back = document.createElement('div');
    back.className = 'leaf-strip-inner leaf-strip-back';
    back.style.left = (-(i * stripWidth - overlap)) + 'px';
    back.style.width = w + 'px';
    back.style.height = h + 'px';

    const shade = document.createElement('div');
    shade.className = 'leaf-strip-shade';

    strip.appendChild(front);
    strip.appendChild(back);
    strip.appendChild(shade);
    leaf.appendChild(strip);
  }
}

function animateLeafTurn(durationMs, onDone){
  const strips = Array.from(leaf.querySelectorAll('.leaf-strip'));
  const start = performance.now();

  function frame(now){
    const elapsed = now - start;
    const t = Math.min(1, elapsed / durationMs);

    strips.forEach((strip, i) => {
      const stagger = i / STRIP_COUNT * 0.18;
      const localT = Math.max(0, Math.min(1, (t - stagger) / (1 - 0.18)));
      const eased = localT < 0.5
        ? 2 * localT * localT
        : 1 - Math.pow(-2 * localT + 2, 2) / 2;
      const angle = eased * 178;
      strip.style.transform = `rotateY(${-angle}deg)`;

      const shadeEl = strip.querySelector('.leaf-strip-shade');
      const shadeAmount = Math.sin(eased * Math.PI) * 0.35;
      shadeEl.style.background = `rgba(40,35,25,${shadeAmount})`;
    });

    if(t < 1){
      requestAnimationFrame(frame);
    } else {
      onDone && onDone();
    }
  }
  requestAnimationFrame(frame);
}

function revealNext(skippedIdea){
  if(isAnimating || !currentWeekRow) return;
  isAnimating = true;
  skipBtn.disabled = true;

  let choices = ideaPool;
  if(skippedIdea && ideaPool.length > 1){
    choices = ideaPool.filter(p => p.id !== skippedIdea.id);
  }
  const next = pickRandom(choices.length ? choices : ideaPool);
  if(!next){ isAnimating = false; skipBtn.disabled = false; return; }

  const oldWeekText = currentWeekLabel.textContent;
  const oldIdeaText = currentIdeaText.textContent;
  buildLeafStrips(oldWeekText, oldIdeaText);
  leaf.classList.add('turning');

  currentIdeaText.textContent = next.idea_text;
  currentIdea = { id: next.id, text: next.idea_text };
  stageCaption.textContent = "still deciding";

  playPageSound();
  animateLeafTurn(1300, () => {
    leaf.classList.remove('turning');
    leaf.innerHTML = '';
    isAnimating = false;
    skipBtn.disabled = false;
  });

  // tell the database this idea is back in the pool to skip (fire and forget;
  // the UI has already moved on, this just keeps the server in sync)
  if(skippedIdea){
    supabaseClient.rpc('skip_week_idea', { token: ACCESS_TOKEN, p_idea_id: skippedIdea.id })
      .then(({ error }) => { if(error) console.error('skip_week_idea failed', error); });
  }
}

function showUploadScreenFor(weekRow){
  uploadWeekLabel.textContent = `Week ${ordinalWeek(weekRow.week_number)}`;
  uploadIdeaText.textContent = weekRow.idea_text;
  uploadScreen.classList.add('visible');
  stageCaption.textContent = "go make it happen, then come back here";
}

function resetUploadForm(){
  selectedPhotoFile = null;
  photoInput.value = '';
  photoPickerLabel.style.display = '';
  photoPickerLabel.textContent = 'tap to add a photo';
  const existingImg = photoPicker.querySelector('img');
  if(existingImg) existingImg.remove();
  noteField.value = '';
  uploadStatus.textContent = '';
  uploadStatus.classList.remove('error');
  submitWeekBtn.disabled = false;
  submitWeekBtn.textContent = 'save this week';
}

photoInput.addEventListener('change', () => {
  const file = photoInput.files && photoInput.files[0];
  if(!file) return;
  selectedPhotoFile = file;
  const reader = new FileReader();
  reader.onload = (e) => {
    let img = photoPicker.querySelector('img');
    if(!img){
      img = document.createElement('img');
      photoPicker.insertBefore(img, photoInput);
    }
    img.src = e.target.result;
    photoPickerLabel.style.display = 'none';
  };
  reader.readAsDataURL(file);
});

submitWeekBtn.addEventListener('click', async () => {
  if(!currentWeekRow) return;
  submitWeekBtn.disabled = true;
  submitWeekBtn.textContent = 'saving…';
  uploadStatus.classList.remove('error');
  uploadStatus.textContent = '';

  try{
    let photoPath = null;
    if(selectedPhotoFile){
      const ext = (selectedPhotoFile.name.split('.').pop() || 'jpg').toLowerCase();
      photoPath = `${ACCESS_TOKEN}/week-${String(currentWeekRow.week_number).padStart(2,'0')}.${ext}`;
      const { error: uploadError } = await supabaseClient.storage
        .from('week-photos')
        .upload(photoPath, selectedPhotoFile, { upsert: true, contentType: selectedPhotoFile.type });
      if(uploadError) throw uploadError;
    }

    const { error: rpcError } = await supabaseClient.rpc('complete_week', {
      token: ACCESS_TOKEN,
      p_week_number: currentWeekRow.week_number,
      p_photo_path: photoPath,
      p_note: noteField.value.trim() || null
    });
    if(rpcError) throw rpcError;

    uploadScreen.classList.remove('visible');
    completedScreen.classList.add('visible');
    stageCaption.textContent = "see you next week";

    // advance local state so the page reflects the new "current" week
    currentWeekRow.status = 'completed';
    const next = findCurrentWeek();
    setTimeout(() => {
      completedScreen.classList.remove('visible');
      resetUploadForm();
      if(next){
        showCurrent(next);
        stageCaption.textContent = next.status === 'chosen' ? "go make it happen, then come back here" : "still deciding";
      } else {
        currentWeekLabel.textContent = "The End";
        currentIdeaText.textContent = "All fifty-two weeks are complete. What a year.";
        skipBtn.style.display = 'none';
        chooseBtn.style.display = 'none';
        stageCaption.textContent = "a year, completed";
      }
    }, 2600);

  } catch(err){
    console.error('Failed to save week', err);
    uploadStatus.textContent = "that didn't save — check your connection and try again";
    uploadStatus.classList.add('error');
    submitWeekBtn.disabled = false;
    submitWeekBtn.textContent = 'save this week';
  }
});

cover.addEventListener('click', async () => {
  if(cover.classList.contains('opened')) return;
  cover.classList.add('opened');
  playPageSound();
  bookLoading.classList.add('visible');

  const ok = await loadBookState();
  if(!ok) return; // error message already shown inside loadBookState

  setTimeout(() => {
    bookLoading.classList.remove('visible');
    const current = findCurrentWeek();
    if(current){
      showCurrent(current);
      stageCaption.textContent = current.status === 'chosen' ? "go make it happen, then come back here" : "still deciding";
    } else {
      currentWeekLabel.textContent = "The End";
      currentIdeaText.textContent = "All fifty-two weeks are complete. What a year.";
      skipBtn.style.display = 'none';
      chooseBtn.style.display = 'none';
      stageCaption.textContent = "a year, completed";
    }
  }, 550);
});

skipBtn.addEventListener('click', () => {
  if(!currentIdea) return;
  revealNext(currentIdea);
});

chooseBtn.addEventListener('click', async () => {
  if(!currentIdea || !currentWeekRow) return;
  chooseBtn.disabled = true;
  chooseBtn.textContent = "saving…";
  try{
    const { error } = await supabaseClient.rpc('choose_week_idea', {
      token: ACCESS_TOKEN,
      p_week_number: currentWeekRow.week_number,
      p_idea_id: currentIdea.id,
      p_idea_text: currentIdea.text
    });
    if(error) throw error;

    currentWeekRow.status = 'chosen';
    currentWeekRow.idea_text = currentIdea.text;
    skipBtn.style.display = 'none';
    chooseBtn.style.display = 'none';
    showUploadScreenFor(currentWeekRow);
  } catch(err){
    console.error('Failed to save choice', err);
    chooseBtn.disabled = false;
    chooseBtn.textContent = "this is the one";
    stageCaption.textContent = "that didn't save — try again";
  }
});
</script>

</body>
</html>
